# Cloudflare Worker — sadece statik dosyalar (Static Assets)
# Gerekli: npm i && npx wrangler login && npm run deploy
# https://developers.cloudflare.com/workers/static-assets/

name = "lazhemturizm"
compatibility_date = "2025-10-01"
# main yok: assets-only Worker; HTML/CSS/görseller edge'den servis edilir

[assets]
# Yalnızca `public/`: node_modules / araçlar yüklenmez, deploy hızlı kalır
directory = "./public"
# Çok sayfalı site: bilinmeyen URL'ler 404; SPA gerekirse: not_found_handling = "single-page-application"
